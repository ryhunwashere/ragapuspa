services:
  ragapuspa:
    container_name: ragapuspa
    image: ragapuspa:0.1
    build:
      context: .
      dockerfile: dockerfile
      args:
        - S3_BUCKET=${S3_BUCKET}
        - S3_FOLDER_PREFIX=${S3_FOLDER_PREFIX}
        - S3_ENDPOINT=${S3_ENDPOINT}
        - S3_REGION=${S3_REGION}
        - S3_ACCESS_KEY=${S3_ACCESS_KEY}
        - S3_ACCESS_SECRET=${S3_ACCESS_SECRET}
    ports:
      - "4321:80"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 32M